<!DOCTYPE html>
  <html>
  <body>
  <script>
  // 先确认 Bridge 是否存在
  if (typeof OKashContext === 'undefined') {
      document.write('<h2>OKashContext UNDEFINED — Bridge 未注入</h2>');
  } else {
      document.write('<h2>OKashContext EXISTS</h2>');

      // 调用 getRuntime 做最简单验证（无需登录）
      var runtime = OKashContext.handleJsBindingsSync(
          JSON.stringify({functionName: "getRuntime", functionData: "{}"})
      );
      document.write('<p>getRuntime: ' + runtime + '</p>');

      // 调用 getVersionName（无需登录）
      var ver = OKashContext.handleJsBindingsSync(
          JSON.stringify({functionName: "getVersionName", functionData: "{}"})
      );
      document.write('<p>getVersionName: ' + ver + '</p>');

      // 调用 getFromNative token（需已登录）
      var token = OKashContext.handleJsBindingsSync(
          JSON.stringify({
              functionName: "getFromNative",
              functionData: JSON.stringify({key: "token"})
          })
      );
      document.write('<p>token: ' + token + '</p>');

      // 调用 getFromNative mobile（需已登录）
      var mobile = OKashContext.handleJsBindingsSync(
          JSON.stringify({
              functionName: "getFromNative",
              functionData: JSON.stringify({key: "mobile"})
          })
      );
      document.write('<p>mobile: ' + mobile + '</p>');
  }
  </script>
  </body>
  </html>
